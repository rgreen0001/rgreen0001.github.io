<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪資計算器 - 週日開始版</title>
    <!-- 引入 Flatpickr (日曆) 與 SheetJS (Excel) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .section { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 1px solid #e1e4e8; }
        .input-group { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .input-item { flex: 1; min-width: 180px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: #1a73e8; color: white; width: 100%; margin-top: 15px; font-size: 16px; }
        .btn-add:hover { background-color: #1557b0; }
        .btn-export { background-color: #28a745; color: white; margin-top: 20px; width: 100%; font-size: 16px; }
        .btn-export:hover { background-color: #218838; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f1f3f4; color: #555; }
        .edit-input { width: 70px; text-align: center; border: 2px dashed #1a73e8; border-radius: 4px; padding: 4px; font-weight: bold; color: #1a73e8; }
        .total-box { margin-top: 20px; text-align: right; font-size: 1.5em; font-weight: bold; color: #d93025; padding-top: 10px; border-top: 2px solid #eee; }
        .btn-delete { background-color: #ea4335; color: white; padding: 6px 12px; border-radius: 4px; }
        .hint { font-size: 0.85em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>時薪計算系統 (週日開始版)</h2>

    <div class="section">
        <div class="input-group">
            <div class="input-item">
                <label>設定時薪 (TWD):</label>
                <input type="number" id="hourlyRate" value="196">
            </div>
            <div class="input-item">
                <label>選擇工作日期 (可多選):</label>
                <input type="text" id="datePicker" placeholder="點擊日曆勾選日期">
                <div class="hint">※ 日曆已設定為週日開始</div>
            </div>
            <div class="input-item">
                <label>預設時數:</label>
                <input type="number" id="defaultHours" value="8" step="0.5">
            </div>
        </div>
        <button class="btn-add" onclick="batchAdd()">批次新增至清單</button>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>工作時數 (可修改)</th>
                <th>當日小計</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total-box">
        總計應領金額: $<span id="totalAmount">0</span>
    </div>

    <button class="btn-export" onclick="exportToExcel()">💾 匯出 Excel 檔案</button>
</div>

<script>
    let records = [];
    
    // 初始化 Flatpickr，設定週日 (0) 為一週的第一天
    const fp = flatpickr("#datePicker", {
        mode: "multiple",
        dateFormat: "Y-m-d",
        conjunction: ", ",
        locale: {
            firstDayOfWeek: 0 // 0 代表星期日
        }
    });

    function updateDisplay() {
        const tbody = document.querySelector('#recordTable tbody');
        tbody.innerHTML = '';
        let total = 0;
        const rate = parseFloat(document.getElementById('hourlyRate').value) || 0;

        // 排序：讓日期由舊到新排列
        records.sort((a, b) => new Date(a.date) - new Date(b.date));

        records.forEach((rec, index) => {
            const subtotal = rate * rec.hours;
            total += subtotal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${rec.date}</td>
                <td><input type="number" class="edit-input" value="${rec.hours}" step="0.5" onchange="editHours(${index}, this.value)"> 小時</td>
                <td>$${subtotal.toLocaleString()}</td>
                <td><button class="btn-delete" onclick="deleteRecord(${index})">刪除</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totalAmount').innerText = total.toLocaleString();
    }

    function batchAdd() {
        const selectedDates = fp.selectedDates;
        const hours = parseFloat(document.getElementById('defaultHours').value);

        if (selectedDates.length === 0) return alert("請先選擇日期");

        selectedDates.forEach(dateObj => {
            const dateStr = dateObj.toLocaleDateString('sv-SE'); 
            // 檢查是否重複，不重複才新增
            if (!records.some(r => r.date === dateStr)) {
                records.push({ date: dateStr, hours: hours });
            }
        });

        fp.clear(); // 新增完畢自動清空選擇器[cite: 1]
        updateDisplay();
    }

    function editHours(index, newVal) {
        records[index].hours = parseFloat(newVal) || 0;
        updateDisplay();
    }

    function deleteRecord(index) {
        records.splice(index, 1);
        updateDisplay();
    }

    function exportToExcel() {
        if (records.length === 0) return alert("目前沒有紀錄可匯出");
        
        const rate = document.getElementById('hourlyRate').value;
        const data = records.map(r => ({
            "日期": r.date,
            "時薪": rate,
            "工作時數": r.hours,
            "小計金額": rate * r.hours
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "薪資明細");
        XLSX.writeFile(wb, `薪資報表_${new Date().toLocaleDateString('sv-SE')}.xlsx`);
    }
</script>

</body>
</html>
